# Local quality gates — mirror CI so problems surface before push.
# Install with: pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.5, numpy>=1.26, types-PyYAML]
        pass_filenames: false

  - repo: local
    hooks:
      - id: import-linter
        name: import-linter (architecture boundaries)
        entry: lint-imports
        language: system
        pass_filenames: false
        always_run: true
